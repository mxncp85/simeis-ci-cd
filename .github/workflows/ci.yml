name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dev:
    # Pour les MR et les pushes hors main
    if: github.event_name != 'push' || github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run development targets
        run: make ci-dev

  release:
    # Une fois mergé dans main, construire les artefacts de release et la documentation.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Typst compiler
        run: cargo install --locked typst-cli

      - name: Run release targets
        run: make ci-release

      - name: Publish release assets (manual + binary)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="build-${GITHUB_SHA::7}"
          TITLE="Build ${GITHUB_SHA::7}"

          # Ensure the tag exists remotely before creating the release.
          git tag "$TAG" || true
          git push origin "$TAG" || true

          gh release view "$TAG" > /dev/null 2>&1 || \
            gh release create "$TAG" --title "$TITLE" --notes "Build automatique depuis main."

          gh release upload "$TAG" \
            doc/manual.pdf \
            target/release/simeis-server \
            --clobber
