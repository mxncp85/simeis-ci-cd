name: Dependency Update

on:
  schedule:
    # Tout les jours à 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependency update tool
        run: cargo install --locked cargo-edit

      - name: Update dependencies
        shell: bash
        run: |
          # Some cargo-edit versions do not support --workspace.
          # Upgrade each Cargo.toml explicitly for better compatibility.
          while IFS= read -r manifest; do
            cargo upgrade --incompatible --manifest-path "$manifest"
          done < <(find . -name Cargo.toml -not -path "./target/*" -not -path "./.git/*")

          cargo update

      - name: Detect changes
        id: detect_changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request
        if: steps.detect_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          BRANCH_NAME="bot/deps-update"
          PR_TITLE="chore: update Rust dependencies"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH_NAME"
          git add -A
          git commit -m "$PR_TITLE" || true
          git push --force-with-lease origin "$BRANCH_NAME"

          gh label create bot/update --color 1d76db --description "Automated dependency update" || true

          PR_NUMBER=$(gh pr list \
            --head "$BRANCH_NAME" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --head "$BRANCH_NAME" \
              --base main \
              --title "$PR_TITLE" \
              --body "MAJ des dépendances avec cargo tools." \
              --label bot/update
          else
            gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --add-label bot/update
          fi
